services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-forecasting-db
    environment:
      POSTGRES_DB: retail_forecasting
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_forecasting"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: retail-forecasting-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  retail-forecasting-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-forecasting-app:latest
    container_name: retail-forecasting-app
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://retail_user:retail_password@postgres:5432/retail_forecasting
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
